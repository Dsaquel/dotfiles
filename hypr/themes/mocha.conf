general {
    gaps_in = 6
    gaps_out = 14
    border_size = 3
    col.active_border = rgba(cba6f7ee) rgba(f5c2e7ee) rgba(b4befeee) rgba(74C7ECee) rgba(cba6f7ee) 45deg
    col.inactive_border = rgba(45475A88)
    layout = dwindle
    resize_on_border = true
    hover_icon_on_border = true
}

decoration {
    rounding = 16
    active_opacity = 1.0
    inactive_opacity = 0.94
    blur {
        enabled = true
        size = 6
        passes = 2
        new_optimizations = true
        ignore_opacity = true
        contrast = 1.1
        brightness = 1.0
        vibrancy = 0.18
        vibrancy_darkness = 0.05
        special = true
        popups = true
        popups_ignorealpha = 0.2
    }
    shadow {
        enabled = true
        range = 12
        render_power = 2
        sharp = false
        color = rgba(cba6f799)
        color_inactive = rgba(00000044)
    }
    glow {
        enabled = true
        range = 20
        color = rgba(cba6f7cc)
        color_inactive = rgba(45475A33)
    }
    dim_inactive = true
    dim_strength = 0.06
    dim_special = 0.4
}

animations {
    enabled = true
    bezier = oshiPop,    0.05, 0.9,  0.1,  1.08
    bezier = oshiSmooth, 0.25, 1.0,  0.5,  1.0
    bezier = oshiSpring, 0.34, 1.56, 0.64, 1.0
    bezier = oshiQuick,  0.4,  0.0,  0.2,  1.0
    bezier = oshiBounce, 0.5,  -0.4, 0.4,  1.4
    bezier = oshiOver,   0.16, 1.0,  0.3,  1.2

    animation = windows,        1, 8, oshiSpring,  popin 60%
    animation = windowsIn,      1, 8, oshiOver,    popin 50%
    animation = windowsOut,     1, 7, oshiQuick,   popin 80%
    animation = windowsMove,    1, 7, oshiSmooth

    animation = border,         1, 15, oshiSmooth
    animation = borderangle,    0, 150, oshiSmooth
    animation = fade,           1, 2,  oshiQuick
    animation = fadeIn,         1, 2,  oshiOver
    animation = fadeOut,        1, 2,  oshiQuick
    animation = fadeSwitch,     1, 2,  oshiSmooth

    animation = workspaces,        1, 8, oshiPop,    slidefade 25%
    animation = workspacesIn,      1, 9, oshiBounce, slidefade 30%
    animation = workspacesOut,     1, 7, oshiQuick,  slidefade 25%
    animation = specialWorkspace,  1, 10, oshiSpring, slidefadevert 30%
    animation = specialWorkspaceIn,  1, 10, oshiBounce, slidefadevert 35%
    animation = specialWorkspaceOut, 1, 8,  oshiQuick,  slidefadevert 30%

    animation = layers,         1, 7, oshiQuick, slide
    animation = layersIn,       1, 8, oshiOver,  slide
    animation = layersOut,      1, 6, oshiQuick, slide

    animation = fadeGlow,       1, 6, oshiSmooth
}

dwindle {
    preserve_split = true
    smart_split = false
    smart_resizing = true
}

# 3-finger swipe gestures (Hyprland 0.54.3 flat syntax)
gesture = 3, horizontal, workspace
gesture = 3, vertical, special
