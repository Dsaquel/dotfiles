windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

windowrule {
    name = move-hyprland-run
    match:class = hyprland-run
    move = 20 monitor_h-120
    float = yes
}

windowrule {
    name = osu-confine-pointer
    match:class = ^(osu!)$
    confine_pointer = 1
}

# Waybar islands run on layer namespaces "left" (DP-3) and "right" (HDMI-A-1),
# set via "name" in waybar/config.jsonc — Hyprland matches on namespace, not binary.
# Hyprland 0.55 deprecated the legacy `layerrule = blur, ns` syntax: use block form
# with snake_case fields (ignore_alpha, blur_popups). See Hyprland Discussions #12607
# / #12798 / #12754.
# Known edge case (hyprwm/Hyprland#6130): blur binds only after a window exists
# on the workspace. Open one window per monitor at first start.
layerrule {
    name = waybar-islands
    match:namespace = ^(left|right)$
    blur = true
    ignore_alpha = 0.2
    blur_popups = true
}
