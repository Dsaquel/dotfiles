$mainMod = SUPER

bind = $mainMod, Return, exec, kitty
bind = $mainMod, Q, killactive
bind = $mainMod, M, exit
bind = $mainMod, N, exec, thunar
bind = $mainMod, V, togglefloating
bind = $mainMod, D, exec, fuzzel
bind = $mainMod, J, layoutmsg, togglesplit
bind = $mainMod SHIFT, J, layoutmsg, rotatesplit
bind = $mainMod, F, fullscreen

bind = $mainMod, Delete, exec, hyprlock
bind = $mainMod SHIFT, Delete, exec, wlogout -p layer-shell

bind = $mainMod CTRL, T, exec, ~/.local/bin/theme-switch.sh toggle

bind = , Print, exec, hyprshot -m region --freeze
bind = $mainMod, Print, exec, hyprshot -m window --freeze
bind = $mainMod SHIFT, Print, exec, hyprshot -m output
bind = $mainMod CTRL, Print, exec, notify-send "Screenshot in 3s..." && sleep 3 && hyprshot -m region --freeze

bind = $mainMod SHIFT, V, exec, cliphist list | fuzzel --dmenu | cliphist decode | wl-copy

bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d
bind = $mainMod, h,     movefocus, l
bind = $mainMod, l,     movefocus, r
bind = $mainMod, k,     movefocus, u
bind = $mainMod, j,     movefocus, d

bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, l, movewindow, r
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, j, movewindow, d

bind = $mainMod CTRL, h, resizeactive, -20 0
bind = $mainMod CTRL, l, resizeactive, 20 0
bind = $mainMod CTRL, k, resizeactive, 0 -20
bind = $mainMod CTRL, j, resizeactive, 0 20

# Workspaces 1–10 on AZERTY top alpha row a z e r t y u i o p (code:24..33).
bind = $mainMod, code:24, workspace, 1
bind = $mainMod, code:25, workspace, 2
bind = $mainMod, code:26, workspace, 3
bind = $mainMod, code:27, workspace, 4
bind = $mainMod, code:28, workspace, 5
bind = $mainMod, code:29, workspace, 6
bind = $mainMod, code:30, workspace, 7
bind = $mainMod, code:31, workspace, 8
bind = $mainMod, code:32, workspace, 9
bind = $mainMod, code:33, workspace, 10
bind = $mainMod SHIFT, code:24, movetoworkspace, 1
bind = $mainMod SHIFT, code:25, movetoworkspace, 2
bind = $mainMod SHIFT, code:26, movetoworkspace, 3
bind = $mainMod SHIFT, code:27, movetoworkspace, 4
bind = $mainMod SHIFT, code:28, movetoworkspace, 5
bind = $mainMod SHIFT, code:29, movetoworkspace, 6
bind = $mainMod SHIFT, code:30, movetoworkspace, 7
bind = $mainMod SHIFT, code:31, movetoworkspace, 8
bind = $mainMod SHIFT, code:32, movetoworkspace, 9
bind = $mainMod SHIFT, code:33, movetoworkspace, 10

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = $mainMod, S, movetoworkspace, special
bind = $mainMod SHIFT, S, togglespecialworkspace
bind = $mainMod CTRL, S, movetoworkspace, +0

bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = SUPER SHIFT, space, exec, ~/.local/bin/play-pause-toggle.sh
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

bind = $mainMod, X, exec, handy --toggle-transcription
bind = $mainMod SHIFT, X, exec, handy --toggle-post-process
bind = $mainMod, Escape, exec, handy --cancel

bind = SUPER SHIFT, B, exec, ~/.local/bin/kitty-opacity-toggle.sh toggle

# Window groups (tabbed/stacked windows in single tile)
bind = $mainMod, G, togglegroup
bind = $mainMod SHIFT, G, changegroupactive, f
bind = $mainMod CTRL,  G, moveoutofgroup

bind = $mainMod, W, submap, groupify
submap = groupify
bind = , h, moveintoorcreategroup, l
bind = , j, moveintoorcreategroup, d
bind = , k, moveintoorcreategroup, u
bind = , l, moveintoorcreategroup, r
bind = , escape, submap, reset
bind = , Return, submap, reset
submap = reset

# Color picker (auto-copy hex to clipboard)
bind = $mainMod, C, exec, hyprpicker -an -f hex
# Vibrance shader toggle (gaming saturation boost)
bind = $mainMod SHIFT, C, exec, hyprshade toggle vibrance
