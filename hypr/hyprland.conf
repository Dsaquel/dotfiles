monitor=DP-3,1920x1080@144,0x0,1
monitor=HDMI-A-1,1920x1080@60,1920x0,1

# Workspace pinning: 1–5 → DP-3, 6–10 → HDMI-A-1
workspace = 1, monitor:DP-3, default:true
workspace = 2, monitor:DP-3
workspace = 3, monitor:DP-3
workspace = 4, monitor:DP-3
workspace = 5, monitor:DP-3
workspace = 6, monitor:HDMI-A-1, default:true
workspace = 7, monitor:HDMI-A-1
workspace = 8, monitor:HDMI-A-1
workspace = 9, monitor:HDMI-A-1
workspace = 10, monitor:HDMI-A-1

# NVIDIA-specific (CRITICAL for RTX 2060 on Wayland)
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
env = GBM_BACKEND,nvidia-drm
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = XDG_SESSION_TYPE,wayland

env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Bibata-Modern-Classic

# GTK theme — theme-switch.sh rewrites this between modes
env = GTK_THEME,catppuccin-latte-mauve-standard+default

env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_STYLE_OVERRIDE,kvantum
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1

# Japanese input (fcitx5)
# GTK_IM_MODULE=fcitx removed — triggers fcitx5 "Wayland Diagnose" warning on Wayland
# XMODIFIERS covers XWayland; GTK4 apps use Wayland input method protocol natively
env = XMODIFIERS,@im=fcitx
env = QT_IM_MODULE,wayland

source = /home/element/.config/hypr/theme.conf
source = /home/element/.config/hypr/keybinds.conf
source = /home/element/.config/hypr/autostart.conf
source = /home/element/.config/hypr/rules.conf

input {
    kb_layout = fr
    follow_mouse = 1
    sensitivity = 0
    kb_options = caps:escape,altwin:swap_lalt_lwin
}

cursor {
    no_hardware_cursors = true
}

plugin {
    hyprfocus {
        enabled = yes
        animate_floating = yes
        animate_workspacechange = no
        focus_animation = shrink

        bezier = focusBezier, 0.16, 1.0, 0.3, 1.2

        shrink {
            shrink_percentage = 0.985
            in_bezier  = focusBezier
            in_speed   = 0.08
            out_bezier = focusBezier
            out_speed  = 0.12
        }
    }
}
