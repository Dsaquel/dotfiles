font_family      family="Hack Nerd Font"
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

cursor #cba6f7
cursor_trail 1
cursor_blink_interval 0

# wallpaper handled by Hyprland (awww)
background_opacity 0.55
background_blur 1
dynamic_background_opacity yes

tab_bar_edge bottom
tab_bar_align left
tab_bar_style custom
tab_bar_min_tabs 1
tab_activity_symbol none
bell_on_tab no
tab_separator ""
tab_bar_margin_width 0.0
tab_bar_margin_height 0.0 0.0
tab_title_template "{f'{title[:30]}…' if title.rindex(title[-1]) + 1 > 30 else (title.center(6) if (title.rindex(title[-1]) + 1) % 2 == 0 else title.center(5))}"
active_tab_font_style   bold-italic
active_tab_foreground   #1e1e2e
active_tab_background   #cba6f7
inactive_tab_font_style normal

allow_remote_control yes
listen_on unix:/tmp/kitty-{kitty_pid}

map kitty_mod+enter new_window_with_cwd
map cmd+enter       new_window_with_cwd
map kitty_mod+n next_window
map kitty_mod+p previous_window
map kitty_mod+h kitten /home/element/.local/share/nvim/lazy/kitty-scrollback.nvim/python/kitty_scrollback_nvim.py
# kitty_mod+s removed: save-session.py missing

scrollback_pager nvim -c "normal G" -
scrollback_lines 10000

# symlink retargeted by theme-switch.sh
include theme-active.conf

window_alert_on_bell no

# Suppress Claude Code's built-in OSC 99 idle popup ("Claude is waiting for your input").
# Stop hook fires a notification on turn-end already; CC's nag is duplicate.
filter_notification title:"Claude Code" or body:"Claude is waiting for your input"

include open-actions.conf
